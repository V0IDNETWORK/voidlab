<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VOIDLAB · sqli-lab</title>
  <style>
    body { background:#0a0e14; color:#e7e9ee; font-family: 'JetBrains Mono', monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { background:#12161f; border:1px solid #2a2f3a; border-radius:8px; padding:32px; width:340px; }
    h1 { color:#7c5cff; font-size:1.1rem; margin-top:0; }
    input { width:100%; box-sizing:border-box; margin-bottom:12px; padding:10px; background:#0a0e14; border:1px solid #2a2f3a; color:#e7e9ee; border-radius:4px; }
    button { width:100%; padding:10px; background:#7c5cff; border:none; color:#fff; border-radius:4px; cursor:pointer; font-weight:600; }
    .error { color:#ff3864; font-size:0.9rem; }
    label { font-size:0.8rem; color:#8b93a7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&gt; VOIDLAB // internal-portal login</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <label>username</label>
      <input type="text" name="username" autocomplete="off">
      <label>password</label>
      <input type="password" name="password" autocomplete="off">
      <button type="submit">authenticate</button>
    </form>
  </div>
</body>
</html>
