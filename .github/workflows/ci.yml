name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: black --check voidremote tests
      - run: ruff check voidremote tests
      - run: mypy voidremote

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Android Platform Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb || true

      - name: Install package (SDK + CLI + dev tools)
        run: pip install -e ".[cli,dev]"

      - name: Run unit, integration, CLI, and packaging tests
        run: pytest tests/unit tests/integration tests/cli tests/packaging -v --cov=voidremote --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  gui-smoke-test:
    name: GUI smoke test (offscreen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libxcb-cursor0
      - run: pip install -e ".[gui,dev]"
      - name: Run GUI tests (offscreen platform)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/gui -v -m gui

  packaging:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install the built wheel and verify import
        run: |
          pip install dist/*.whl
          python -c "from voidremote import VoidRemote, Device, PairingSession; print('import OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
