name: 🐛 Bug Report
description: Report a bug in the VoidRemote SDK, CLI, or GUI
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SDK (voidremote.api)
        - CLI (voidremote command)
        - GUI (voidremote-gui)
        - Packaging / installation
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: VoidRemote version
      description: Output of `voidremote version` or `pip show voidremote`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A script or exact CLI command that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback (if any)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
